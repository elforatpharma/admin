<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>تسجيل دخول | الفرات فارما - Al-Furat Pharma</title>
    <meta name="description" content="نظام إدارة الفرات فارما - منصة متكاملة لإدارة الصيدلية والمبيعات والمخزون" />
    <meta name="keywords" content="فرات فارما, صيدلية, أدوية, صحة, نظام إدارة, مبيعات, مخزون" />
    <meta name="author" content="Al-Furat Pharma" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="الفرات فارما - Al-Furat Pharma" />
    <meta property="og:description" content="نظام إدارة متكامل للصيدلية" />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:locale" content="ar_AR" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="الفرات فارما - Al-Furat Pharma" />
    <meta name="twitter:description" content="نظام إدارة متكامل للصيدلية" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://elforatpharma.com/" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f8f6f6 0%, #ffffff 100%);
        }

        /* أنيميشن الطفو للوجو */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        /* أنيميشن ظهور العناصر بالتدريج */
        .fade-up {
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 640px) {
            .login-container {
                padding: 1.5rem !important;
                border-radius: 32px !important;
            }
            .input-field {
                padding: 0.875rem 0.75rem !important;
                font-size: 0.9375rem;
            }
            .submit-btn {
                padding: 0.875rem !important;
                font-size: 1rem !important;
            }
        }

        /* دعم الاتجاه الأفقي للجوال */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: center !important;
            }
            .login-container {
                max-width: 90vw !important;
                padding: 1rem 1.5rem !important;
                margin: 0.5rem;
            }
            .logo-img {
                height: 2.5rem !important;
            }
            .title-text {
                font-size: 1.25rem !important;
            }
            .subtitle-text {
                font-size: 0.75rem !important;
            }
            .input-field {
                padding: 0.75rem 0.625rem !important;
            }
            .submit-btn {
                padding: 0.75rem !important;
                font-size: 0.9375rem !important;
            }
        }

        /* Floating Label Styles */
        .floating-label-group {
            position: relative;
        }
        .floating-input {
            peer: '';
        }
        .floating-label {
            position: absolute;
            right: 3rem;
            top: 1.125rem;
            transition: all 0.2s ease;
            pointer-events: none;
            color: #94a3b8;
            font-weight: 500;
        }
        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: -0.625rem;
            right: 0.875rem;
            font-size: 0.75rem;
            color: #ec135b;
            background: white;
            padding: 0 0.375rem;
        }

        /* Password Toggle Button */
        .password-toggle {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
        }
        .password-toggle:hover {
            color: #ec135b;
        }

        /* Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] size-96 bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-10%] size-96 bg-primary/5 rounded-full blur-3xl"></div>
    </div>

    <div class="login-container bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.05)] w-full max-w-md border border-white/50 text-center space-y-6 z-10 fade-up">
        
        <div class="space-y-3">
            <div class="inline-block float-animation">
                <img src="logo.png" alt="الفرات فارما" class="logo-img h-20 w-auto object-contain mix-blend-multiply" loading="eager" fetchpriority="high" />
            </div>
            <div class="fade-up delay-1">
                <h1 class="title-text text-2xl font-black text-slate-800">لوحة التحكم</h1>
                <p class="subtitle-text text-sm text-slate-500 font-medium">أهلاً بك مجدداً في الفرات فارما</p>
            </div>
        </div>

        <form id="login-form" class="space-y-4 fade-up delay-2">
            <div class="floating-label-group relative">
                <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#ec135b] transition-colors">
                    lock
                </span>
                <input type="password" id="password" placeholder=" " 
                    class="floating-input input-field w-full p-5 pr-12 pl-12 bg-slate-50 border-2 border-transparent rounded-[24px] text-right font-bold focus:bg-white focus:border-[#ec135b]/20 focus:ring-4 focus:ring-[#ec135b]/5 outline-none transition-all placeholder:text-transparent peer"
                    required>
                <label for="password" class="floating-label">كلمة المرور</label>
                <button type="button" class="password-toggle" id="togglePassword" aria-label="إظهار كلمة المرور">
                    <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                    </svg>
                </button>
            </div>

            <button type="submit" id="submit-btn"
                class="submit-btn w-full bg-[#ec135b] text-white py-5 rounded-[24px] font-black text-lg shadow-xl shadow-[#ec135b]/20 hover:bg-[#d01150] hover:shadow-[#ec135b]/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                <span>دخول الآدمن</span>
                <svg class="size-5 group-hover:translate-x-[-4px] transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                </svg>
            </button>
        </form>

        <div id="errorMsg" class="error-msg hidden bg-red-50 border-2 border-red-200 rounded-2xl p-4 text-center">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="text-xl">⚠️</span>
                <span class="font-bold text-red-700">تنبيه أمني</span>
            </div>
            <p class="text-sm text-red-600 font-medium mb-3">كلمة المرور التي أدخلتها غير صحيحة</p>
            <a href="#" class="text-xs text-[#ec135b] font-bold hover:underline inline-flex items-center gap-1">
                <span>نسيت كلمة المرور؟</span>
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
        </div>

        <div class="pt-4 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Elforat Pharma Security System</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submit-btn');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        // Toggle Password Visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
                togglePasswordBtn.setAttribute('aria-label', 'إخفاء كلمة المرور');
            } else {
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
                togglePasswordBtn.setAttribute('aria-label', 'إظهار كلمة المرور');
            }
        });

        loginForm.onsubmit = async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const email = "ElforatPharma@gmail.com"; 

            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>جاري التحقق...</span>
            `;
            submitBtn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';

            } catch (error) {
                console.error("Login Error:", error.message);
                errorMsg.classList.remove('hidden');
                // هز الـ Form عند الخطأ
                loginForm.classList.add('animate-shake');
                setTimeout(() => loginForm.classList.remove('animate-shake'), 500);
            } finally {
                submitBtn.innerHTML = '<span>دخول الآدمن</span><svg class="size-5 group-hover:translate-x-[-4px] transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>';
                submitBtn.disabled = false;
            }
        };
    </script>

</body>

</html>
