<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول | الفرات فارما</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f8f6f6 0%, #ffffff 100%);
        }

        /* أنيميشن الطفو للوجو */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        /* أنيميشن ظهور العناصر بالتدريج */
        .fade-up {
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] size-96 bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-10%] size-96 bg-primary/5 rounded-full blur-3xl"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.05)] w-full max-w-md border border-white/50 text-center space-y-8 z-10 fade-up">
        
        <div class="space-y-4">
            <div class="inline-block float-animation">
                <img src="logo.png" alt="الفرات فارما" class="h-20 w-auto object-contain mix-blend-multiply" />
            </div>
            <div class="fade-up delay-1">
                <h1 class="text-2xl font-black text-slate-800">لوحة التحكم</h1>
                <p class="text-sm text-slate-500 font-medium">أهلاً بك مجدداً في الفرات فارما</p>
            </div>
        </div>

        <form id="login-form" class="space-y-5 fade-up delay-2">
            <div class="relative group">
                <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#ec135b] transition-colors">
                    lock
                </span>
                <input type="password" id="password" placeholder="أدخل كلمة المرور"
                    class="w-full p-5 pr-12 bg-slate-50 border-2 border-transparent rounded-[24px] text-right font-bold focus:bg-white focus:border-[#ec135b]/20 focus:ring-4 focus:ring-[#ec135b]/5 outline-none transition-all placeholder:text-slate-300 placeholder:font-medium"
                    required>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-[#ec135b] text-white py-5 rounded-[24px] font-black text-lg shadow-xl shadow-[#ec135b]/20 hover:bg-[#d01150] hover:shadow-[#ec135b]/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                <span>دخول الآدمن</span>
                <svg class="size-5 group-hover:translate-x-[-4px] transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                </svg>
            </button>
        </form>

        <p id="error-msg" class="text-sm text-red-500 font-bold hidden flex items-center justify-center gap-2">
            <span>❌</span>
            <span>عذراً، كلمة المرور غير صحيحة</span>
        </p>

        <div class="pt-4 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Elforat Pharma Security System</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const email = "ElforatPharma@gmail.com"; 

            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>جاري التحقق...</span>
            `;
            submitBtn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';

            } catch (error) {
                console.error("Login Error:", error.message);
                errorMsg.classList.remove('hidden');
                // هز الـ Form عند الخطأ
                loginForm.classList.add('animate-shake');
                setTimeout(() => loginForm.classList.remove('animate-shake'), 500);
            } finally {
                submitBtn.innerHTML = '<span>دخول الآدمن</span><svg class="size-5 group-hover:translate-x-[-4px] transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>';
                submitBtn.disabled = false;
            }
        };
    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</body>

</html>
